<section class="pantalla-formulario">
  <div class="form-card">
    <p class="etiqueta">Acceso de jugadores</p>
    <h1>Iniciar sesión</h1>

    <form (ngSubmit)="iniciarSesion()">
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="usuario@email.com"
        [(ngModel)]="email"
      />

      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Ingresá tu contraseña"
        [(ngModel)]="password"
      />

      <button type="submit">
        Ingresar
      </button>
    </form>

    <p class="nota">
      En Sprint 2 este formulario validará usuarios contra Supabase.
    </p>
  </div>
</section>

<app-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  tipo="info"
  (cerrar)="cerrarModal()"
></app-modal>
